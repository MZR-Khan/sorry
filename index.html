<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Romantic Proposal Prank 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { touch-action: manipulation; }
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        @media (max-width: 768px) { .custom-cursor { display: none !important; } }
        .luxury-glow { text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.6); }
        .gradient-bg {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 25%, #2d0033 50%, #660033 75%, #cc0066 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .hearts-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .text-hero-mobile { font-size: clamp(2rem, 8vw, 4rem) !important; }
        .text-sub-mobile { font-size: clamp(1.25rem, 5vw, 2rem) !important; }
        .btn-mobile { font-size: clamp(1.1rem, 4vw, 1.5rem) !important; padding: 1rem 2rem !important; min-height: 60px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="gradient-bg text-white relative">

    <canvas class="hearts-canvas" id="heartsCanvas"></canvas>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="text-center px-4">
            <div class="w-20 h-20 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mx-auto mb-8"></div>
            <h1 class="text-3xl md:text-4xl luxury-glow font-light tracking-wider">Loading Romance...</h1>
        </div>
    </div>

    <div id="formStatus" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-full text-sm z-50 hidden shadow-xl"></div>

    <!-- Step 1: Name Entry -->
    <div id="nameScreen" class="fixed inset-0 flex items-center justify-center z-20 px-4 py-12">
        <div class="glass-card p-8 md:p-12 rounded-3xl max-w-md w-full text-center">
            <h1 class="text-hero-mobile md:text-5xl font-light mb-6 luxury-glow leading-tight" id="typingText"></h1>
            <div class="space-y-6">
                <input type="text" id="nameInput" placeholder="Enter your beautiful name..." 
                       class="w-full px-6 py-5 bg-white/10 backdrop-blur-xl rounded-2xl text-lg text-center border-2 border-white/20 focus:border-pink-400 focus:outline-none">
                <button id="continueBtn" class="w-full btn-mobile bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl font-semibold hover:scale-105 transition-all duration-300 shadow-xl">
                    Continue 💖
                </button>
            </div>
        </div>
    </div>

    <!-- Step 2: Proposal Screen -->
    <div id="proposalScreen" class="fixed inset-0 flex flex-col items-center justify-center z-10 px-4 py-12 hidden">
        <div class="text-center mb-12 w-full max-w-4xl mx-auto">
            <h1 class="text-hero-mobile md:text-5xl lg:text-7xl font-light mb-6 luxury-glow px-4">
                <span class="name-placeholder"></span>,<br> I Love You ❤️
            </h1>
            <h2 class="text-sub-mobile md:text-3xl font-light luxury-glow opacity-80">Do You Love Me Too?</h2>
        </div>
        <div class="space-y-6 w-full max-w-2xl">
            <button id="noBtn" class="no-btn w-full py-7 bg-gradient-to-r from-gray-600 to-gray-800 rounded-3xl btn-mobile font-semibold transition-all duration-300 shadow-xl">
                🥺 NO
            </button>
            <button id="yesBtn" class="yes-btn w-full py-7 bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl btn-mobile font-semibold hover:scale-110 transition-all duration-500 shadow-2xl">
                💖 YES
            </button>
        </div>
    </div>

    <!-- Step 3: Celebration Screen -->
    <div id="celebrateScreen" class="fixed inset-0 flex flex-col items-center justify-center z-30 px-4 py-12 hidden">
        <div class="text-center">
            <h1 class="text-5xl md:text-8xl font-light mb-8 luxury-glow">💖 YES! 💖</h1>
            <p class="text-xl md:text-3xl font-light opacity-90">You made my heart explode! ❤️</p>
        </div>
    </div>

    <!-- Step 4: Prank Reveal -->
    <div id="prankScreen" class="fixed inset-0 flex flex-col items-center justify-center z-40 px-4 py-12 hidden overflow-y-auto">
        <div class="text-center w-full max-w-4xl mx-auto">
            <h1 class="text-6xl md:text-9xl font-bold mb-6 luxury-glow" style="background: linear-gradient(45deg, #FFD700, #FF6B9D, #4ECDC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">HAHA 😂❤️</h1>
            
            <div class="glass-card p-8 md:p-12 rounded-3xl w-full max-w-3xl mx-auto mb-10">
                <h2 class="text-2xl md:text-4xl font-semibold mb-6 luxury-glow">Sorry... I Was Just Kidding 😭</h2>
                <p class="text-lg md:text-2xl opacity-90 mb-8">You really thought this was a real proposal? 🤣💔</p>
                <div class="border-t-2 border-yellow-400 pt-6">
                    <h3 class="text-3xl md:text-4xl font-bold luxury-glow mb-4">You Have Been Officially Pranked 😎</h3>
                </div>
            </div>

            <div class="glass-card p-8 rounded-3xl w-full max-w-2xl mx-auto mb-10">
                <h3 class="text-2xl md:text-3xl font-semibold mb-6 luxury-glow">💭 Comment Please!</h3>
                <textarea id="commentInput" rows="3" 
                          class="w-full p-6 bg-white/10 backdrop-blur-xl rounded-2xl text-lg text-white border-2 border-white/20 focus:border-yellow-400 focus:outline-none resize-none"
                          placeholder="How did the prank make you feel? 😂💔"></textarea>
                <button id="submitCommentBtn" class="w-full mt-6 py-5 px-8 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-2xl text-xl font-bold hover:scale-105 transition-all duration-300 shadow-xl">
                    Submit & Share 😂
                </button>
            </div>
        </div>
    </div>

    <script>
        // 🔴 IMPORTANT: PASTE YOUR NEW DEPLOYMENT URL HERE
        // After deploying Apps Script, copy the URL and paste it below
        const FORM_URL = 'https://script.google.com/macros/s/AKfycbyiq0HCD_3fBxty3VsTa5jztwinGQaiWInYjLYSnufYFsm0Hi3hQdB3rsBgzQtj7E9hIQ/exec';
        
        let userName = '';
        let noClickCount = 0;
        let nameSubmitted = false;
        let commentSubmitted = false;

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('formStatus');
            statusEl.textContent = message;
            statusEl.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-sm z-50 shadow-xl ${isError ? 'bg-red-500' : 'bg-green-500'} text-white`;
            statusEl.classList.remove('hidden');
            setTimeout(() => statusEl.classList.add('hidden'), 3000);
        }

        // SIMPLE WORKING SAVE FUNCTION
        async function saveToGoogleSheets(data) {
            try {
                const response = await fetch(FORM_URL, {
                    method: 'POST',
                    mode: 'no-cors', // This works with the simplified Apps Script
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                console.log('Data sent to sheets:', data.type);
                showStatus(`✅ ${data.type === 'NAME_ENTRY' ? 'Name saved!' : data.type === 'COMMENT' ? 'Comment saved!' : 'Saved!'}`);
                return true;
            } catch (error) {
                console.error('Save error:', error);
                showStatus('⚠️ Note: Data saved locally', true);
                return false;
            }
        }

        // Hearts animation
        const canvas = document.getElementById('heartsCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let hearts = [];
        for(let i = 0; i < 15; i++) {
            hearts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: -Math.random() * 1 - 0.5,
                size: Math.random() * 0.8 + 0.3,
                life: Math.random() * 0.5 + 0.5
            });
        }
        
        function animateHearts() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(heart => {
                ctx.globalAlpha = heart.life * 0.6;
                ctx.font = `${heart.size * 25}px Arial`;
                ctx.fillText('💖', heart.x, heart.y);
                heart.x += heart.vx;
                heart.y += heart.vy;
                heart.life -= 0.002;
                if(heart.life <= 0 || heart.y < -50) {
                    heart.x = Math.random() * canvas.width;
                    heart.y = canvas.height + 20;
                    heart.life = 1;
                }
            });
            requestAnimationFrame(animateHearts);
        }
        animateHearts();

        // Loading
        window.addEventListener('load', () => {
            setTimeout(() => {
                gsap.to('#loadingScreen', { opacity: 0, duration: 0.8, onComplete: () => {
                    document.getElementById('loadingScreen').style.display = 'none';
                }});
            }, 1000);
        });

        // Typing
        function typeWriter(text, element, speed = 80) {
            let i = 0;
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
        typeWriter("Enter Your Beautiful Name ❤️", document.getElementById('typingText'), 70);

        // Name screen
        const nameInput = document.getElementById('nameInput');
        const continueBtn = document.getElementById('continueBtn');
        
        continueBtn.addEventListener('click', async () => {
            userName = nameInput.value.trim() || 'Beautiful Soul';
            
            if (!nameSubmitted) {
                await saveToGoogleSheets({
                    name: userName,
                    timestamp: new Date().toISOString(),
                    type: 'NAME_ENTRY',
                    noClicks: 0
                });
                nameSubmitted = true;
            }
            
            gsap.to('#nameScreen', { opacity: 0, scale: 0.8, duration: 0.8, onComplete: () => {
                document.getElementById('nameScreen').style.display = 'none';
                document.getElementById('proposalScreen').classList.remove('hidden');
                document.querySelector('.name-placeholder').textContent = userName;
                gsap.from('#proposalScreen', { opacity: 0, scale: 0.9, duration: 1 });
            }});
        });
        
        nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') continueBtn.click(); });

        // Proposal logic
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        
        noBtn.addEventListener('click', async (e) => {
            noClickCount++;
            
            await saveToGoogleSheets({
                name: userName,
                timestamp: new Date().toISOString(),
                type: 'NO_CLICK',
                noClicks: noClickCount
            });
            
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;
            
            gsap.to(noBtn, { x: newX, y: newY, duration: 0.5, rotation: Math.random() * 360 - 180 });
            gsap.to(yesBtn, { scale: 1 + Math.min(noClickCount * 0.05, 0.3), duration: 0.2, yoyo: true, repeat: 1 });
        });
        
        yesBtn.addEventListener('click', async () => {
            await saveToGoogleSheets({
                name: userName,
                timestamp: new Date().toISOString(),
                type: 'PROPOSAL_ACCEPTED',
                noClicks: noClickCount
            });
            
            document.getElementById('proposalScreen').style.display = 'none';
            document.getElementById('celebrateScreen').classList.remove('hidden');
            gsap.from('#celebrateScreen', { opacity: 0, scale: 0.5, duration: 1 });
            
            setTimeout(() => {
                document.getElementById('celebrateScreen').style.display = 'none';
                document.getElementById('prankScreen').classList.remove('hidden');
                gsap.from('#prankScreen', { opacity: 0, scale: 0.8, duration: 1 });
            }, 2500);
        });
        
        // Comment submission
        const commentInput = document.getElementById('commentInput');
        const submitCommentBtn = document.getElementById('submitCommentBtn');
        
        submitCommentBtn.addEventListener('click', async () => {
            const comment = commentInput.value.trim();
            if (!comment) {
                commentInput.classList.add('ring-4', 'ring-yellow-400');
                setTimeout(() => commentInput.classList.remove('ring-4', 'ring-yellow-400'), 1000);
                return;
            }
            
            if (commentSubmitted) return;
            
            await saveToGoogleSheets({
                name: userName,
                comment: comment,
                noClicks: noClickCount,
                timestamp: new Date().toISOString(),
                type: 'COMMENT'
            });
            
            commentSubmitted = true;
            submitCommentBtn.innerHTML = '✅ Submitted! Thanks 😂';
            submitCommentBtn.disabled = true;
            commentInput.disabled = true;
        });
        
        console.log('✅ Website ready! Make sure to update FORM_URL with your deployed Apps Script URL');
        console.log('📍 Current FORM_URL:', FORM_URL);
    </script>
</body>
</html>
